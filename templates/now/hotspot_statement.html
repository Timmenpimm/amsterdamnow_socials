*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1080px;height:1350px;}
:root{
  --accent:#E90000;--ink:#000000;--ink-3:#313131;--ink-2:#666666;
  --bg-subtle:#F4F5F6;
  --display:'Barlow Condensed','Oswald',sans-serif;
  --body:'Oswald',sans-serif;
}
.slide{width:1080px;height:1350px;position:relative;overflow:hidden;background:#fff;font-family:var(--body);-webkit-font-smoothing:antialiased;}
.clamp{display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;}

.statement{background:#fff;display:flex;flex-direction:column;justify-content:center;padding:120px 110px;}
.statement .mark{font-family:var(--display);font-weight:700;color:var(--accent);font-size:96px;line-height:.5;height:60px;}
.statement blockquote{font-family:var(--display);font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:clamp(64px,8.2vw,98px);line-height:1.0;color:var(--ink);text-wrap:balance;margin:40px 0 0;-webkit-line-clamp:7;}
.statement .dash{width:88px;height:6px;background:var(--accent);margin-top:64px;}
</style>
</head>
<body>
<div class="slide statement">
  <div class="mark">&ldquo;</div>
  <blockquote class="clamp">{{quote}}</blockquote>
  <div class="dash"></div>
</div>
</body>
</html>
