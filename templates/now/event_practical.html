*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1080px;height:1920px;}
:root{--accent:#E90000;--ink:#000000;--ink-2:#666666;--display:'Barlow Condensed','Oswald',sans-serif;--body:'Oswald',sans-serif;}
.story{width:1080px;height:1920px;position:relative;overflow:hidden;background:#fff;font-family:var(--body);-webkit-font-smoothing:antialiased;}
.clamp{display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;}
